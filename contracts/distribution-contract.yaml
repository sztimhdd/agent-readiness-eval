version: "3.0.0"

# Default excludes (applied to all targets)
default_excludes:
  - archive/**
  - runs/**
  - .worktrees/**
  - .superpowers/**
  - .omo/**
  - __pycache__/**
  - "*.pyc"
  - .DS_Store
  - dist/**
  - .git/**
  - .codegraph/**
  - .gitignore
  - tasks/*/environment/service/runtime-state/**
  - AGENTS.md
  - opencode.json
  - contracts/**
  - scripts/build-distribution.py
  - tests/**
  - docs/superpowers/**
  - tasks/*/task-design-note.md
  - docs/task-*
  - docs/benchmark-*
  - docs/opencode-full-*

# Agent-visible package: what the agent sees at runtime
agent_package:
  include:
    - SKILL.md
    - skill.json
    - README.md
    - tasks/*/task.md
    - tasks/*/inputs/**
    - tasks/*/output-requirements.md
    - tasks/*/capability-contract.yaml
    - tasks/*/environment/public/**
    - tasks/*/profiles/*/public/**
    - tasks/*/profiles/*/profile-contract.yaml
    - tasks/*/environment-contract.yaml
    - scripts/task005_tool.py
    - templates/**
  exclude:
    - tasks/*/evaluator-notes/**
    - tasks/*/evaluator-private/**
    - tasks/*/environment/private/**
    - tasks/*/environment/service/**
    - tasks/*/profiles/*/service/**
    - tasks/*/profiles/*/service

# Runtime-exposed assets: read-only mount at deploy time, NOT in skill install
runtime_exposed:
  include:
    - tasks/task-004/environment/base-project/**
  exclude: []

# Runtime-private assets: environment service only, agent CANNOT access
runtime_private:
  include:
    - tasks/task-005/environment/private/**
    - tasks/task-005/environment/service/**
  exclude: []

# Evaluator-only: human reviewer only, never enters agent/runtime packages
evaluator_only:
  include:
    - tasks/*/evaluator-notes/**
    - tasks/*/evaluator-private/**
    - docs/OFFLINE-SCORING-GUIDE.md
    - docs/INSTALL-*.md
    - docs/PRD_core_v2.md
    - docs/TDD_core_v2.md
  exclude: []
