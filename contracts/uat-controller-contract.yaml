version: "4.0.0"

tool_authorization:
  note: "The controller binds Profiles; the Skill does not declare allowed-tools."
  profile_bindings:
    task-001: static-eval
    task-002: static-eval
    task-003: static-eval
    task-004: coding-eval
    task-005: stateful-eval
  profile_capabilities:
    static-eval: [filesystem.list, filesystem.read, filesystem.write_answer]
    coding-eval: [filesystem.read, filesystem.write_answer, code.edit, code.exec]
    stateful-eval: [filesystem.read, filesystem.write_answer, stateful.read, stateful.write]
  fallback_profiles:
    read_only_shell_fallback:
      capability: shell.exec.read_only
      diagnostic_only: true
  stateful_tool_boundary:
    public_agent_tools:
      - list_requests
      - get_request
      - list_policies
      - get_policy
      - get_approval_status
      - request_information
      - approve_request
      - reject_request
      - escalate_request
    admin_controller_tools:
      - get_final_state
      - get_action_log
      - reset
