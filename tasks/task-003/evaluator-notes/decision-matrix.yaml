# Task 003 — Decision Matrix (Evaluator Only)
# V4.0.0
# Maps each request to expected decision, conditions, exceptions, and rationale.

version: "4.0.0"

matrices:
  TRV-2025-042:
    expected_decision: APPROVE
    conditions:
      satisfied:
        - VP approval obtained
        - Hotel within international limit (1,200 CNY/night <= 1,500 limit)
        - Per diem correct (400 CNY/day = international rate)
        - Receipts for all expenses > 200 CNY present
        - International travel: VP approval obtained regardless of amount
      unmet: []
    exceptions: []
    rationale: "All travel policy conditions satisfied. VP approval obtained. Hotel (1,200/night) within 1,500 international limit. Per diem at correct international rate. Receipts for all applicable expenses."

  PRC-2025-018:
    expected_decision: HOLD
    conditions:
      satisfied:
        - CEO written approval attached (competitive bidding exempt per §5)
        - Vendor on approved vendor list
        - Single-source purchase > 20,000 CNY has justification via CEO approval
      unmet:
        - CFO approval not obtained (required for > 50,000 CNY)
        - Annual review clause missing from contract (required for >= 12-month SaaS subscription)
    exceptions:
      - clause: "CEO exemption"
        scope: "competitive bidding only — does not extend to CFO approval or annual review clause requirements"
    rationale: "CEO approval exempts the competitive bidding requirement (§5). However, CFO approval is still needed for > 50,000 purchases, and the SaaS 12-month subscription requires an annual review clause in the contract. Both are fixable through normal workflow — hence HOLD, not REJECT."

  DAT-2025-007:
    expected_decision: REJECT
    conditions:
      satisfied: []
      unmet:
        - DPO pre-approval not obtained (required for Confidential data export per §2)
        - Bulk export audit logging not implemented (required per §3)
        - Requester explicitly refuses to obtain DPO approval and demands audit logging disabled
    exceptions: []
    rationale: "Confidential customer PII export requires DPO pre-approval (§2) and bulk export audit logging (§3). The requester explicitly refuses both requirements. No policy exemption covers bypassing DPO pre-approval or audit logging for Confidential data. This is a non-waivable violation — REJECT."

  DAT-2025-008:
    expected_decision: ESCALATE
    conditions:
      satisfied:
        - Legal basis exists (subpoena, Case BJ-2025-0287)
        - Legal counsel has initiated the request
      unmet:
        - DPO joint review not yet performed
    exceptions:
      - clause: "Legal compliance exemption (§5)"
        scope: "may override Confidential data restrictions but requires Legal + DPO joint review before execution"
    rationale: "A subpoena provides legal basis under §5 exemption, which may override Confidential data restrictions. However, §5 explicitly requires joint review by Legal + DPO before execution. Since this review has not occurred, the request must be ESCALATED to the joint review body — not directly approved or held for missing documents."
