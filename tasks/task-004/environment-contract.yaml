task_id: task-004
contract_version: "1.0.0"
environment_type: runnable_project

runtime:
  interpreter: python3
  minimum_version: "3.10"
  external_dependencies: none
  network_access: false

environment_layout:
  base_project: environment/base-project/
  writable_directories:
    - path: src/
      description: Source files under test — agent may modify to repair bugs
  read_only_paths:
    - path: tests/
      description: Test suite — must not be modified by agent
    - path: data/
      description: Input data files — must not be modified by agent
    - path: expected-output-format.md
      description: Output format specification — must not be modified by agent
    - path: README.md
      description: Task instructions — read-only reference

allowed_modifications:
  - src/**

prohibited_modifications:
  - tests/**
  - data/**
  - expected-output-format.md

tool_requirements:
  - file_read
  - file_write
  - process_execution
